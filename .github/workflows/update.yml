name: Update prices

on:
  schedule:
    # 06:00 UTC every day. Pick whatever time you want.
    # cron format: minute hour day-of-month month day-of-week
    - cron: "0 6 * * *"
  workflow_dispatch:  # lets you run it manually from the Actions tab

permissions:
  contents: write  # needed to commit the updated data.json back

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Scrape starpets.gg
        run: python scripts/scrape.py

      - name: Combine with values
        run: python scripts/combine.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json raw_prices.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: daily update ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
